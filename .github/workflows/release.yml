name: Release

# Publishes to NuGet on a version tag (e.g. v1.0.0). Bump <Version> in
# src/Anypost/Anypost.csproj, tag the commit, and push.
#
# Auth is NuGet Trusted Publishing (OIDC) — no stored API key. Configure the
# trusted publishing policy on nuget.org (your username → Trusted Publishing)
# for this repo + workflow, and set the NUGET_USER repository variable to your
# nuget.org username (profile name, not email). `id-token: write` is required.

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --configuration Release

      - name: Pack
        run: dotnet pack src/Anypost/Anypost.csproj --configuration Release --output ./artifacts

      - name: NuGet login (OIDC → short-lived API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet
        run: >-
          dotnet nuget push "./artifacts/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
